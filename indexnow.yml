name: IndexNow Auto Sync

on:
  repository_dispatch:
    types: [cms_update] # microCMSの更新通知を受け取る設定
  workflow_dispatch:      # 手動でも実行できるようにしておく

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get Blog IDs and Submit to IndexNow
        run: |
          # 1. microCMSから全記事のIDを取得してURLリスト(urls.txt)を作る
          # ※ 自分のサービスドメイン(yukkuripczanmai)に合わせてるよ
          curl -H "X-MICROCMS-API-KEY: ${{ secrets.MICROCMS_API_KEY }}" \
          "https://yukkuripczanmai.microcms.io/api/v1/blogs?fields=id&limit=100" \
          | jq -r '.contents[].id' \
          | sed 's|^|https://ypz-official-site.pages.dev/post?id=|' > urls.txt

          # 2. ついでにトップページとブログ一覧ページも追加
          echo "https://ypz-official-site.pages.dev/" >> urls.txt
          echo "https://ypz-official-site.pages.dev/blog" >> urls.txt

          # 3. 作ったリストをBing IndexNowに送信
          curl -X POST "https://www.bing.com/indexnow" \
          -H "Content-Type: application/json; charset=utf-8" \
          -d '{
            "host": "ypz-official-site.pages.dev",
            "key": "fbc95f59f2ea4f08a30be6882a775cd1",
            "keyLocation": "https://ypz-official-site.pages.dev/fbc95f59f2ea4f08a30be6882a775cd1.txt",
            "urlList": '$(jq -Rs 'split("\n") | map(select(length > 0))' urls.txt)'
          }'

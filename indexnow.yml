name: IndexNow

on:
  push:
    branches:
      - main # 自分のメインブランチ名に合わせてね

jobs:
  check-and-submit:
    runs-on: ubuntu-latest
    steps:
      - name: Submit to IndexNow
        uses: jakob-bagterp/index-now-submit-sitemap-urls-action@v1
        with:
          host: 'https://ypz-official-site.pages.dev/'
          sitemap_locations: 'https://ypz-official-site.pages.dev/sitemap.xml'
          api_key: 'さっき発行したAPIキー'
          api_key_location: 'https://あなたのドメイン.com/さっきのファイル名.txt'

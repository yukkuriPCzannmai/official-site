  <style>
    /* 【重要】ここが「小っちゃく」する魔法の数字です */
    body {
      background-color: #f4f7f6;
      margin: 0;
      background: #f7f8fa;
    }

    .post-content {
      background: white;
      padding: 60px 50px;
      border-radius: 14px;
    }

    /* 画面中央に、適切な幅で表示 */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    /* 1行に3〜4つ並ぶグリッド設定 */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    /* カードのサイズを固定して「デカすぎ」を阻止 */
    .blog-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      transition: 0.3s;
      display: flex;
      flex-direction: column;
    }

    .blog-card:hover {
      transform: translateY(-5px);
    }

    .blog-card a {
      text-decoration: none;
      color: #333;
    }

    /* サムネイルを小さく固定 */
    .blog-card img {
      width: 100%;
      height: 160px;
      /* 縦幅を160pxに固定 */
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .card-content h3 {
      font-size: 1rem;
      margin: 0 0 10px;
      height: 2.8em;
      overflow: hidden;
    }

    .card-content p {
      font-size: 0.8rem;
      color: #888;
      margin: 0;
    }
  </style>

  <article class="post-content">


    <div id="blog-list" class="blog-grid">
      <p>記事を読み込んでいます...</p>
    </div>

    <script>
      (function () {
        fetch("/api/getPosts")
          .then(res => res.json())
          .then(data => {
            const listElement = document.getElementById("blog-list");
            if (!listElement) return; // 要素がない場合のガード
            listElement.innerHTML = "";

            data.contents.forEach(post => {
              const card = document.createElement("div");
              card.className = "blog-card";
              card.innerHTML = `
          <a href="post.html?id=${post.id}">
            <img src="${post.eyecatch ? post.eyecatch.url : ''}">
            <div class="card-content">
              <h3>${post.title}</h3>
              <p>${new Date(post.publishedAt).toLocaleDateString()} 更新</p>
            </div>
          </a>
        `;
              listElement.appendChild(card);
            });
          }) // ← ここが抜けていたよ！
          .catch(err => console.error("Fetch error:", err));
      })(); // 即時関数の閉じ
    </script>
